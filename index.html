<!DOCTYPE html>
<html>
<head>
<title>Viking Island Survivor</title>
<style>
body { margin: 0; overflow: hidden; background: #111; font-family: Arial, sans-serif; }
canvas { display: block; margin: auto; background: #4d9a4d; }
</style>
</head>
<body>
<canvas id="game" width="1000" height="600"></canvas>

<script>
    const GAME_VERSION = "v0.5.1
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const player = {
    x: 500, y: 300, size: 30, speed: 4,
    wood: 0, stone: 0, berries: 0, meat: 0, cookedMeat: 0,
    health: 100, hunger: 100, thirst: 100,
    axe: "None", pickaxe: "None", weapon: "Fists",
    attackDamage: 20,
    alive: true
};

let day = 1;
let minutes = 420;
let movementCounter = 0;
let recipeBookOpen = false;
let campfirePanelOpen = false;
let selectedCampfire = null;
let selectedTab = "Tools";
let message = "";
let messageTimer = 0;
let currentAction = null;

const keys = {};
const buttons = [];

const recipes = [
    {name:"Stone Axe", tab:"Tools", wood:3, stone:2, time:30},
    {name:"Stone Pickaxe", tab:"Tools", wood:3, stone:3, time:30},
    {name:"Stone Spear", tab:"Weapons", wood:2, stone:2, time:20},
    {name:"Campfire", tab:"Structures", wood:5, stone:5, time:45},
    {name:"Lean-To", tab:"Structures", wood:10, stone:0, time:120}
];

const trees = [
    {x:120,y:110,size:35,wood:10,maxWood:10,depleted:false,respawnTimer:0},
    {x:260,y:420,size:35,wood:10,maxWood:10,depleted:false,respawnTimer:0},
    {x:760,y:150,size:35,wood:10,maxWood:10,depleted:false,respawnTimer:0}
];

const rocks = [
    {x:420,y:120,size:30,stone:8,maxStone:8,depleted:false,respawnTimer:0},
    {x:850,y:420,size:30,stone:8,maxStone:8,depleted:false,respawnTimer:0}
];

const berryBushes = [
    {x:180,y:500,size:28,berries:5,maxBerries:5,regrowTimer:0},
    {x:640,y:360,size:28,berries:5,maxBerries:5,regrowTimer:0}
];

const monsters = [
    {x:700,y:300,size:30,health:40,speed:1.2,damageCooldown:0},
    {x:850,y:180,size:30,health:40,speed:1.1,damageCooldown:0}
];

const campfires = [];
const shelters = [];

document.addEventListener("keydown", e => {
    const key = e.key.toLowerCase();

    if (!keys[key]) {
        if (key === "e") startGather();
        if (key === "f") eatFood();
        if (key === " ") attack();
    }

    keys[key] = true;
});

document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

canvas.addEventListener("click", e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    for (const b of buttons) {
        if (mx >= b.x && mx <= b.x+b.w && my >= b.y && my <= b.y+b.h) {
            b.action();
            return;
        }
    }

    if (!recipeBookOpen && !campfirePanelOpen && !currentAction) {
        for (const fire of campfires) {
            if (mx >= fire.x && mx <= fire.x + fire.size && my >= fire.y && my <= fire.y + fire.size) {
                selectedCampfire = fire;
                campfirePanelOpen = true;
                return;
            }
        }
    }
});

function setMessage(text) {
    message = text;
    messageTimer = 180;
}

function startAction(name, durationFrames, timeCost, complete) {
    if (currentAction) {
        setMessage("Already doing something.");
        return;
    }

    currentAction = {
        name,
        durationFrames,
        remainingFrames: durationFrames,
        timeCost,
        complete
    };
}

function updateAction() {
    if (!currentAction) return;

    currentAction.remainingFrames--;

    if (currentAction.remainingFrames <= 0) {
        advanceTime(currentAction.timeCost);
        currentAction.complete();
        currentAction = null;
    }
}

function advanceTime(amount) {
    minutes += amount;

    while (minutes >= 1440) {
        minutes -= 1440;
        day++;
    }

    player.hunger -= amount * 0.04;
    player.thirst -= amount * 0.06;

    campfires.forEach(fire => {
        if (fire.lit) {
            fire.fuel -= amount;
            if (fire.fuel <= 0) {
                fire.fuel = 0;
                fire.lit = false;
            }
        }
    });

    if (player.hunger <= 0 || player.thirst <= 0) {
        player.health -= amount * 0.08;
    }

    if (isNight() && !nearLitCampfireOrShelter()) {
        player.health -= amount * 0.04;
    }

    player.hunger = Math.max(0, player.hunger);
    player.thirst = Math.max(0, player.thirst);
}

function formatTime() {
    let h = Math.floor(minutes / 60);
    let m = minutes % 60;
    const ampm = h >= 12 ? "PM" : "AM";
    h = h % 12;
    if (h === 0) h = 12;
    return h + ":" + String(m).padStart(2,"0") + " " + ampm;
}

function isNight() {
    return minutes < 360 || minutes >= 1080;
}

function nearLitCampfireOrShelter() {
    for (const f of campfires) if (f.lit && distance(player, f) < 120) return true;
    for (const s of shelters) if (distance(player, s) < 100) return true;
    return false;
}

function isTouching(a,b) {
    return a.x < b.x+b.size && a.x+a.size > b.x && a.y < b.y+b.size && a.y+a.size > b.y;
}

function distance(a,b) {
    const dx = (a.x+a.size/2)-(b.x+b.size/2);
    const dy = (a.y+a.size/2)-(b.y+b.size/2);
    return Math.sqrt(dx*dx+dy*dy);
}

function update() {
    if (!player.alive) return;

    updateAction();

    let moved = false;

    if (!recipeBookOpen && !campfirePanelOpen && !currentAction) {
        if (keys["w"]) { player.y -= player.speed; moved = true; }
        if (keys["s"]) { player.y += player.speed; moved = true; }
        if (keys["a"]) { player.x -= player.speed; moved = true; }
        if (keys["d"]) { player.x += player.speed; moved = true; }
    }

    if (moved) {
        movementCounter++;
        if (movementCounter >= 120) {
            movementCounter = 0;
            advanceTime(5);
        }
    }

    if (messageTimer > 0) messageTimer--;

    player.x = Math.max(0, Math.min(canvas.width-player.size, player.x));
    player.y = Math.max(0, Math.min(canvas.height-player.size, player.y));

    updateResources();
    updateMonsters();

    if (player.health <= 0) {
        player.health = 0;
        player.alive = false;
    }
}

function updateResources() {
    trees.forEach(t => {
        if (t.depleted && --t.respawnTimer <= 0) {
            t.depleted = false;
            t.wood = t.maxWood;
        }
    });

    rocks.forEach(r => {
        if (r.depleted && --r.respawnTimer <= 0) {
            r.depleted = false;
            r.stone = r.maxStone;
        }
    });

    berryBushes.forEach(b => {
        if (b.berries < b.maxBerries && --b.regrowTimer <= 0) {
            b.berries++;
            b.regrowTimer = 1800;
        }
    });
}

function updateMonsters() {
    monsters.forEach(monster => {
        if (monster.health <= 0) return;

        const chaseRange = isNight() ? 350 : 250;
        const monsterSpeed = isNight() ? monster.speed * 1.5 : monster.speed;

        if (distance(player, monster) < chaseRange && !recipeBookOpen && !campfirePanelOpen) {
            if (monster.x < player.x) monster.x += monsterSpeed;
            if (monster.x > player.x) monster.x -= monsterSpeed;
            if (monster.y < player.y) monster.y += monsterSpeed;
            if (monster.y > player.y) monster.y -= monsterSpeed;
        }

        if (monster.damageCooldown > 0) monster.damageCooldown--;

        if (isTouching(player, monster) && monster.damageCooldown <= 0) {
            player.health -= isNight() ? 15 : 10;
            monster.damageCooldown = 60;
            setMessage("The monster claws you!");
        }
    });
}

function startGather() {
    if (recipeBookOpen || campfirePanelOpen || currentAction) return;

    for (const t of trees) {
        if (isTouching(player,t)) {
            if (t.depleted) return setMessage("Only a stump remains.");

            const timeCost = player.axe === "Stone Axe" ? 15 : 25;
            const duration = player.axe === "Stone Axe" ? 90 : 150;

            startAction("Gathering Wood", duration, timeCost, () => {
                t.wood--;
                player.wood++;

                if (t.wood <= 0) {
                    t.depleted = true;
                    t.respawnTimer = 10800;
                    setMessage("Tree stripped into a stump.");
                } else {
                    setMessage("Gathered 1 wood.");
                }
            });
            return;
        }
    }

    for (const r of rocks) {
        if (isTouching(player,r)) {
            if (r.depleted) return setMessage("Rock is depleted.");

            const timeCost = player.pickaxe === "Stone Pickaxe" ? 20 : 35;
            const duration = player.pickaxe === "Stone Pickaxe" ? 120 : 210;

            startAction("Gathering Stone", duration, timeCost, () => {
                r.stone--;
                player.stone++;

                if (r.stone <= 0) {
                    r.depleted = true;
                    r.respawnTimer = 10800;
                    setMessage("Rock depleted.");
                } else {
                    setMessage("Gathered 1 stone.");
                }
            });
            return;
        }
    }

    for (const b of berryBushes) {
        if (isTouching(player,b)) {
            if (b.berries <= 0) return setMessage("No berries left.");

            startAction("Picking Berries", 72, 10, () => {
                b.berries--;
                player.berries++;
                if (b.regrowTimer <= 0) b.regrowTimer = 1800;
                setMessage("Picked 1 berry.");
            });
            return;
        }
    }

    setMessage("Nothing to gather.");
}

function eatFood() {
    if (currentAction) return;

    if (player.cookedMeat > 0 && player.hunger < 100) {
        player.cookedMeat--;
        player.hunger = Math.min(100, player.hunger + 40);
        advanceTime(10);
        setMessage("Ate cooked meat.");
        return;
    }

    if (player.berries > 0 && player.hunger < 100) {
        player.berries--;
        player.hunger = Math.min(100, player.hunger + 15);
        advanceTime(5);
        setMessage("Ate berries.");
        return;
    }

    setMessage("No food to eat or not hungry.");
}

function attack() {
    if (recipeBookOpen || campfirePanelOpen || currentAction) return;

    let hit = false;

    monsters.forEach(m => {
        if (m.health > 0 && distance(player,m) < 55) {
            m.health -= player.attackDamage;
            hit = true;

            if (m.health <= 0) {
                player.meat++;
                setMessage("Monster killed. Gained raw meat.");
            } else {
                setMessage("You hit the monster.");
            }
        }
    });

    if (hit) advanceTime(5);
}

function startCraft(recipe) {
    if (currentAction) return setMessage("Already doing something.");

    if (player.wood < recipe.wood || player.stone < recipe.stone) {
        return setMessage("Not enough resources.");
    }

    if (recipe.name === "Stone Axe" && player.axe !== "None") return setMessage("Already have axe.");
    if (recipe.name === "Stone Pickaxe" && player.pickaxe !== "None") return setMessage("Already have pickaxe.");
    if (recipe.name === "Stone Spear" && player.weapon !== "Fists") return setMessage("Already have weapon.");

    recipeBookOpen = false;
    player.wood -= recipe.wood;
    player.stone -= recipe.stone;

    const duration = Math.max(90, recipe.time * 3);

    startAction("Crafting " + recipe.name, duration, recipe.time, () => {
        if (recipe.name === "Stone Axe") player.axe = "Stone Axe";
        if (recipe.name === "Stone Pickaxe") player.pickaxe = "Stone Pickaxe";
        if (recipe.name === "Stone Spear") {
            player.weapon = "Stone Spear";
            player.attackDamage = 30;
        }
        if (recipe.name === "Campfire") campfires.push({x:player.x+40,y:player.y,size:30,fuel:0,lit:false});
        if (recipe.name === "Lean-To") shelters.push({x:player.x+40,y:player.y,size:45});

        setMessage("Finished " + recipe.name + ".");
    });
}

function addFuel() {
    if (!selectedCampfire) return;

    if (player.wood <= 0) {
        setMessage("Need wood for fuel.");
        return;
    }

    player.wood--;
    selectedCampfire.fuel += 2;
    advanceTime(2);
    setMessage("Added wood. +2 minutes fuel.");
}

function lightFire() {
    if (!selectedCampfire) return;

    if (selectedCampfire.fuel <= 0) {
        setMessage("Add fuel first.");
        return;
    }

    selectedCampfire.lit = true;
    advanceTime(5);
    setMessage("Campfire lit.");
}

function extinguishFire() {
    if (!selectedCampfire) return;

    selectedCampfire.lit = false;
    advanceTime(2);
    setMessage("Campfire extinguished.");
}

function cookMeat() {
    if (!selectedCampfire) return;

    if (!selectedCampfire.lit) {
        setMessage("Fire must be lit.");
        return;
    }

    if (player.meat <= 0) {
        setMessage("No raw meat to cook.");
        return;
    }

    campfirePanelOpen = false;

    startAction("Cooking Meat", 180, 5, () => {
        player.meat--;
        player.cookedMeat++;
        setMessage("Cooked 1 meat.");
    });
}

function drawButton(x,y,w,h,text,action) {
    ctx.fillStyle = "#333";
    ctx.fillRect(x,y,w,h);
    ctx.strokeStyle = "white";
    ctx.strokeRect(x,y,w,h);
    ctx.fillStyle = "white";
    ctx.font = "16px Arial";
    ctx.fillText(text,x+10,y+24);
    buttons.push({x,y,w,h,action});
}

function drawActionBar() {
    if (!currentAction) return;

    const x = 300;
    const y = 520;
    const w = 400;
    const h = 28;

    const progress = 1 - (currentAction.remainingFrames / currentAction.durationFrames);

    ctx.fillStyle = "rgba(0,0,0,0.75)";
    ctx.fillRect(x - 20, y - 45, w + 40, 90);

    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText(currentAction.name, x, y - 15);

    ctx.fillStyle = "#222";
    ctx.fillRect(x, y, w, h);

    ctx.fillStyle = "gold";
    ctx.fillRect(x, y, w * progress, h);

    ctx.strokeStyle = "white";
    ctx.strokeRect(x, y, w, h);

    ctx.fillStyle = "white";
    ctx.font = "16px Arial";
    ctx.fillText(Math.ceil(currentAction.remainingFrames / 60) + "s remaining", x + 140, y + 20);
}

function draw() {
    buttons.length = 0;
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#4d9a4d";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    trees.forEach(t => {
        if (t.depleted) {
            ctx.fillStyle = "#5b3a1e";
            ctx.fillRect(t.x+8,t.y+20,18,12);
        } else {
            ctx.fillStyle = "#5b3a1e";
            ctx.fillRect(t.x+12,t.y+20,10,25);
            ctx.fillStyle = "#0f5c20";
            ctx.fillRect(t.x,t.y,t.size,t.size);
            ctx.fillStyle = "white";
            ctx.font = "12px Arial";
            ctx.fillText(t.wood,t.x+10,t.y-5);
        }
    });

    rocks.forEach(r => {
        ctx.fillStyle = r.depleted ? "#555" : "gray";
        ctx.fillRect(r.x,r.y,r.size,r.size);
        if (!r.depleted) {
            ctx.fillStyle = "white";
            ctx.font = "12px Arial";
            ctx.fillText(r.stone,r.x+10,r.y-5);
        }
    });

    berryBushes.forEach(b => {
        ctx.fillStyle = "#236b23";
        ctx.fillRect(b.x,b.y,b.size,b.size);
        ctx.fillStyle = "purple";
        for (let i=0;i<b.berries;i++) ctx.fillRect(b.x+5+i*4,b.y+8,3,3);
        ctx.fillStyle = "white";
        ctx.font = "12px Arial";
        ctx.fillText(b.berries,b.x+10,b.y-5);
    });

    campfires.forEach(f => {
        ctx.fillStyle = f.lit ? "orange" : "#7a3f12";
        ctx.fillRect(f.x,f.y,f.size,f.size);

        if (f.lit) {
            ctx.fillStyle = "yellow";
            ctx.fillRect(f.x+8,f.y-8,14,14);
        }
    });

    shelters.forEach(s => {
        ctx.fillStyle = "#8b5a2b";
        ctx.fillRect(s.x,s.y,s.size,s.size);
    });

    monsters.forEach(m => {
        if (m.health > 0) {
            ctx.fillStyle = "red";
            ctx.fillRect(m.x,m.y,m.size,m.size);
            ctx.fillStyle = "black";
            ctx.fillRect(m.x,m.y-10,m.size,5);
            ctx.fillStyle = "lime";
            ctx.fillRect(m.x,m.y-10,m.size*(m.health/40),5);
        }
    });

    ctx.fillStyle = "blue";
    ctx.fillRect(player.x,player.y,player.size,player.size);

    if (isNight()) {
        ctx.fillStyle = "rgba(0,0,40,0.45)";
        ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    drawHUD();
    drawButton(820,20,150,40,"Recipe Book",() => {
        if (!currentAction && !campfirePanelOpen) recipeBookOpen = true;
    });

    if (recipeBookOpen) drawRecipeBook();
    if (campfirePanelOpen) drawCampfirePanel();

    drawActionBar();

    if (!player.alive) {
        ctx.fillStyle = "rgba(0,0,0,0.75)";
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "red";
        ctx.font = "60px Arial";
        ctx.fillText("YOU DIED",360,280);
        ctx.fillStyle = "white";
        ctx.font = "24px Arial";
        ctx.fillText("Refresh to restart",405,330);
    }
}

function drawHUD() {
    ctx.fillStyle = "white";
    ctx.font = "18px Arial";
    ctx.fillText("Day " + day + " - " + formatTime() + (isNight() ? " NIGHT" : " DAY"),20,25);
    ctx.fillText("Health: " + Math.floor(player.health),20,55);
    ctx.fillText("Hunger: " + Math.floor(player.hunger),20,80);
    ctx.fillText("Thirst: " + Math.floor(player.thirst),20,105);
    ctx.fillText("Wood: " + player.wood,20,135);
    ctx.fillText("Stone: " + player.stone,20,160);
    ctx.fillText("Berries: " + player.berries,20,185);
    ctx.fillText("Raw Meat: " + player.meat,20,210);
    ctx.fillText("Cooked Meat: " + player.cookedMeat,20,235);
    ctx.fillText("Axe: " + player.axe,20,265);
    ctx.fillText("Pickaxe: " + player.pickaxe,20,290);
    ctx.fillText("Weapon: " + player.weapon,20,315);

    if (messageTimer > 0) ctx.fillText(message,330,40);
    ctx.fillText("WASD Move | E Gather | F Eat Best Food | Space Attack | Click Fire",20,580);
}

function drawRecipeBook() {
    ctx.fillStyle = "rgba(0,0,0,0.85)";
    ctx.fillRect(220,70,560,460);
    ctx.strokeStyle = "white";
    ctx.strokeRect(220,70,560,460);

    ctx.fillStyle = "white";
    ctx.font = "26px Arial";
    ctx.fillText("Recipe Book",250,110);

    drawButton(710,85,40,30,"X",() => recipeBookOpen = false);

    const tabs = ["Tools","Weapons","Structures"];
    tabs.forEach((tab,i) => {
        drawButton(250+i*130,130,110,35,tab,() => selectedTab = tab);
    });

    const visible = recipes.filter(r => r.tab === selectedTab);

    visible.forEach((r,i) => {
        const y = 190 + i*85;
        ctx.fillStyle = "white";
        ctx.font = "20px Arial";
        ctx.fillText(r.name,260,y);
        ctx.font = "15px Arial";
        ctx.fillText("Cost: " + r.wood + " Wood, " + r.stone + " Stone",260,y+25);
        ctx.fillText("Time: " + r.time + " minutes",260,y+45);
        drawButton(600,y-25,110,40,"Craft",() => startCraft(r));
    });
}

function drawCampfirePanel() {
    if (!selectedCampfire) return;

    ctx.fillStyle = "rgba(0,0,0,0.88)";
    ctx.fillRect(300,100,400,390);
    ctx.strokeStyle = "white";
    ctx.strokeRect(300,100,400,390);

    ctx.fillStyle = "white";
    ctx.font = "26px Arial";
    ctx.fillText("Campfire",330,145);

    ctx.font = "18px Arial";
    ctx.fillText("State: " + (selectedCampfire.lit ? "Lit" : "Unlit"),330,185);
    ctx.fillText("Fuel: " + Math.floor(selectedCampfire.fuel) + " minutes",330,215);
    ctx.fillText("Raw Meat: " + player.meat,330,245);
    ctx.fillText("Cooked Meat: " + player.cookedMeat,330,275);

    drawButton(330,305,150,40,"Add Wood",addFuel);
    drawButton(510,305,150,40,"Light Fire",lightFire);
    drawButton(330,360,150,40,"Cook Meat",cookMeat);
    drawButton(510,360,150,40,"Extinguish",extinguishFire);
    drawButton(430,420,140,40,"Close",() => {
        campfirePanelOpen = false;
        selectedCampfire = null;
    });
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
