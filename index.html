<!DOCTYPE html>
<html>
<head>
<title>Viking Island Survivor</title>
<style>
body { margin: 0; overflow: hidden; background: #111; font-family: Arial, sans-serif; }
canvas { display: block; margin: auto; background: #4d9a4d; }
</style>
</head>
<body>

<canvas id="game" width="1000" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const player = {
    x: 500, y: 300, size: 30, speed: 4,
    wood: 0, stone: 0, berries: 0, meat: 0,
    health: 100, hunger: 100, thirst: 100,
    axe: "None",
    pickaxe: "None",
    weapon: "Fists",
    attackDamage: 20,
    alive: true
};

const keys = {};
let message = "";
let messageTimer = 0;
let gatherCooldown = 0;

const trees = [
    {x: 120, y: 110, size: 35, wood: 10, maxWood: 10, depleted: false, respawnTimer: 0},
    {x: 260, y: 420, size: 35, wood: 10, maxWood: 10, depleted: false, respawnTimer: 0},
    {x: 760, y: 150, size: 35, wood: 10, maxWood: 10, depleted: false, respawnTimer: 0}
];

const rocks = [
    {x: 420, y: 120, size: 30, stone: 8, maxStone: 8, depleted: false, respawnTimer: 0},
    {x: 850, y: 420, size: 30, stone: 8, maxStone: 8, depleted: false, respawnTimer: 0}
];

const berryBushes = [
    {x: 180, y: 500, size: 28, berries: 5, maxBerries: 5, regrowTimer: 0},
    {x: 640, y: 360, size: 28, berries: 5, maxBerries: 5, regrowTimer: 0}
];

const monsters = [
    {x: 700, y: 300, size: 30, health: 40, speed: 1.2, damageCooldown: 0},
    {x: 850, y: 180, size: 30, health: 40, speed: 1.1, damageCooldown: 0}
];

document.addEventListener("keydown", e => {
    const key = e.key.toLowerCase();

    if (!keys[key]) {
        if (key === "e") gather();
        if (key === "f") eatBerries();
        if (key === " ") attack();
        if (key === "1") craftStoneAxe();
        if (key === "2") craftStonePickaxe();
    }

    keys[key] = true;
});

document.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
});

function setMessage(text) {
    message = text;
    messageTimer = 180;
}

function isTouching(a, b) {
    return a.x < b.x + b.size &&
           a.x + a.size > b.x &&
           a.y < b.y + b.size &&
           a.y + a.size > b.y;
}

function distance(a, b) {
    const dx = (a.x + a.size / 2) - (b.x + b.size / 2);
    const dy = (a.y + a.size / 2) - (b.y + b.size / 2);
    return Math.sqrt(dx * dx + dy * dy);
}

function update() {
    if (!player.alive) return;

    if (keys["w"]) player.y -= player.speed;
    if (keys["s"]) player.y += player.speed;
    if (keys["a"]) player.x -= player.speed;
    if (keys["d"]) player.x += player.speed;

    if (gatherCooldown > 0) gatherCooldown--;
    if (messageTimer > 0) messageTimer--;

    player.hunger -= 0.01;
    player.thirst -= 0.015;

    if (player.hunger <= 0 || player.thirst <= 0) {
        player.health -= 0.03;
    }

    player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
    player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));

    updateResources();
    updateMonsters();

    if (player.health <= 0) {
        player.health = 0;
        player.alive = false;
    }
}

function updateResources() {
    trees.forEach(tree => {
        if (tree.depleted) {
            tree.respawnTimer--;
            if (tree.respawnTimer <= 0) {
                tree.depleted = false;
                tree.wood = tree.maxWood;
            }
        }
    });

    rocks.forEach(rock => {
        if (rock.depleted) {
            rock.respawnTimer--;
            if (rock.respawnTimer <= 0) {
                rock.depleted = false;
                rock.stone = rock.maxStone;
            }
        }
    });

    berryBushes.forEach(bush => {
        if (bush.berries < bush.maxBerries) {
            bush.regrowTimer--;
            if (bush.regrowTimer <= 0) {
                bush.berries++;
                bush.regrowTimer = 1800;
            }
        }
    });
}

function updateMonsters() {
    monsters.forEach(monster => {
        if (monster.health <= 0) return;

        const d = distance(player, monster);

        if (d < 250) {
            if (monster.x < player.x) monster.x += monster.speed;
            if (monster.x > player.x) monster.x -= monster.speed;
            if (monster.y < player.y) monster.y += monster.speed;
            if (monster.y > player.y) monster.y -= monster.speed;
        }

        if (monster.damageCooldown > 0) monster.damageCooldown--;

        if (isTouching(player, monster) && monster.damageCooldown <= 0) {
            player.health -= 10;
            monster.damageCooldown = 60;
            setMessage("The monster claws you!");
        }
    });
}

function gather() {
    if (gatherCooldown > 0) {
        setMessage("You are still gathering...");
        return;
    }

    for (const tree of trees) {
        if (isTouching(player, tree)) {
            if (tree.depleted) {
                setMessage("This tree is only a stump.");
                return;
            }

            tree.wood--;
            player.wood++;
            gatherCooldown = player.axe === "Stone Axe" ? 90 : 150;

            if (tree.wood <= 0) {
                tree.depleted = true;
                tree.respawnTimer = 10800;
                setMessage("You stripped the tree into a stump.");
            } else {
                setMessage("Gathered 1 wood.");
            }
            return;
        }
    }

    for (const rock of rocks) {
        if (isTouching(player, rock)) {
            if (rock.depleted) {
                setMessage("This rock is depleted.");
                return;
            }

            rock.stone--;
            player.stone++;
            gatherCooldown = player.pickaxe === "Stone Pickaxe" ? 120 : 210;

            if (rock.stone <= 0) {
                rock.depleted = true;
                rock.respawnTimer = 10800;
                setMessage("You depleted the rock.");
            } else {
                setMessage("Gathered 1 stone.");
            }
            return;
        }
    }

    for (const bush of berryBushes) {
        if (isTouching(player, bush)) {
            if (bush.berries <= 0) {
                setMessage("No berries left. They need time to regrow.");
                return;
            }

            bush.berries--;
            player.berries++;
            gatherCooldown = 72;
            if (bush.berries < bush.maxBerries && bush.regrowTimer <= 0) {
                bush.regrowTimer = 1800;
            }
            setMessage("Picked 1 berry.");
            return;
        }
    }

    setMessage("Nothing to gather here.");
}

function eatBerries() {
    if (player.berries > 0 && player.hunger < 100) {
        player.berries--;
        player.hunger += 15;
        if (player.hunger > 100) player.hunger = 100;
        setMessage("Ate berries.");
    } else {
        setMessage("No berries to eat or not hungry.");
    }
}

function craftStoneAxe() {
    if (player.axe !== "None") {
        setMessage("You already have an axe.");
        return;
    }

    if (player.wood >= 3 && player.stone >= 2) {
        player.wood -= 3;
        player.stone -= 2;
        player.axe = "Stone Axe";
        player.attackDamage = 35;
        setMessage("Crafted Stone Axe.");
    } else {
        setMessage("Need 3 wood and 2 stone for Stone Axe.");
    }
}

function craftStonePickaxe() {
    if (player.pickaxe !== "None") {
        setMessage("You already have a pickaxe.");
        return;
    }

    if (player.wood >= 3 && player.stone >= 3) {
        player.wood -= 3;
        player.stone -= 3;
        player.pickaxe = "Stone Pickaxe";
        setMessage("Crafted Stone Pickaxe.");
    } else {
        setMessage("Need 3 wood and 3 stone for Stone Pickaxe.");
    }
}

function attack() {
    monsters.forEach(monster => {
        if (monster.health > 0 && distance(player, monster) < 55) {
            monster.health -= player.attackDamage;
            setMessage("You hit the monster.");

            if (monster.health <= 0) {
                player.meat++;
                setMessage("Monster killed. Gained 1 meat.");
            }
        }
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#4d9a4d";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    trees.forEach(tree => {
        if (tree.depleted) {
            ctx.fillStyle = "#5b3a1e";
            ctx.fillRect(tree.x + 8, tree.y + 20, 18, 12);
        } else {
            ctx.fillStyle = "#5b3a1e";
            ctx.fillRect(tree.x + 12, tree.y + 20, 10, 25);
            ctx.fillStyle = "#0f5c20";
            ctx.fillRect(tree.x, tree.y, tree.size, tree.size);

            ctx.fillStyle = "white";
            ctx.font = "12px Arial";
            ctx.fillText(tree.wood, tree.x + 10, tree.y - 5);
        }
    });

    rocks.forEach(rock => {
        if (!rock.depleted) {
            ctx.fillStyle = "gray";
            ctx.fillRect(rock.x, rock.y, rock.size, rock.size);

            ctx.fillStyle = "white";
            ctx.font = "12px Arial";
            ctx.fillText(rock.stone, rock.x + 10, rock.y - 5);
        } else {
            ctx.fillStyle = "#555";
            ctx.fillRect(rock.x + 8, rock.y + 12, 14, 8);
        }
    });

    berryBushes.forEach(bush => {
        ctx.fillStyle = "#236b23";
        ctx.fillRect(bush.x, bush.y, bush.size, bush.size);

        ctx.fillStyle = "purple";
        for (let i = 0; i < bush.berries; i++) {
            ctx.fillRect(bush.x + 5 + i * 4, bush.y + 8, 3, 3);
        }

        ctx.fillStyle = "white";
        ctx.font = "12px Arial";
        ctx.fillText(bush.berries, bush.x + 10, bush.y - 5);
    });

    monsters.forEach(monster => {
        if (monster.health > 0) {
            ctx.fillStyle = "red";
            ctx.fillRect(monster.x, monster.y, monster.size, monster.size);

            ctx.fillStyle = "black";
            ctx.fillRect(monster.x, monster.y - 10, monster.size, 5);
            ctx.fillStyle = "lime";
            ctx.fillRect(monster.x, monster.y - 10, monster.size * (monster.health / 40), 5);
        }
    });

    ctx.fillStyle = "blue";
    ctx.fillRect(player.x, player.y, player.size, player.size);

    ctx.fillStyle = "white";
    ctx.font = "18px Arial";
    ctx.fillText("Health: " + Math.floor(player.health), 20, 25);
    ctx.fillText("Hunger: " + Math.floor(player.hunger), 20, 50);
    ctx.fillText("Thirst: " + Math.floor(player.thirst), 20, 75);
    ctx.fillText("Wood: " + player.wood, 20, 100);
    ctx.fillText("Stone: " + player.stone, 20, 125);
    ctx.fillText("Berries: " + player.berries, 20, 150);
    ctx.fillText("Meat: " + player.meat, 20, 175);
    ctx.fillText("Axe: " + player.axe, 20, 205);
    ctx.fillText("Pickaxe: " + player.pickaxe, 20, 230);

    if (gatherCooldown > 0) {
        ctx.fillText("Gather Cooldown: " + (gatherCooldown / 60).toFixed(1) + "s", 20, 260);
    }

    if (messageTimer > 0) {
        ctx.fillText(message, 350, 40);
    }

    ctx.fillText("WASD Move | E Gather | F Eat | Space Attack | 1 Axe | 2 Pickaxe", 20, 580);

    if (!player.alive) {
        ctx.fillStyle = "rgba(0,0,0,0.75)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "red";
        ctx.font = "60px Arial";
        ctx.fillText("YOU DIED", 360, 280);
        ctx.fillStyle = "white";
        ctx.font = "24px Arial";
        ctx.fillText("Refresh to restart", 405, 330);
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
